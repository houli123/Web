<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<style type="text/css">
	#mytext{
		position: fixed;
		left: 50%;
		top: 50%;
		width: 600px;
		height: 400px;
		margin-left: -300px;
		margin-top: -200px;
		text-align: center;
		line-height: 400px;

		border:2px solid black;
		font-size: 20px;
		
	}
	</style>
</head>
<body>
<div id="mytext">自强不息</div>
</body>
</html>
<script type="text/javascript">
var div1 = document.querySelector("#mytext");
var x=20;
document.onkeypress = function(e) {
    if (e.keyCode == 115)//s
    {
        x-=3;
        div1.style["font-size"] = `${x}px`;
    }
    else if (e.keyCode == 97)//a
    {
        x+=3;
        div1.style["font-size"] = `${x}px`;
    }
    else
        alert("请重新确认按键");
        }
</script>
